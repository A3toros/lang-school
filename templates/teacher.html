<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Language School</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50">
    <!-- Header -->
    <header class="bg-amber-500 text-white p-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">Language School Teacher</h1>
            <div class="flex items-center space-x-4">
                <span>Welcome, Teacher</span>
                <button class="bg-amber-600 hover:bg-amber-700 px-4 py-2 rounded">Menu</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-6">
        <!-- Schedule Table -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">My Weekly Schedule</h2>
            </div>
            
            <!-- Week Navigation -->
            <div class="flex justify-between items-center mb-4">
                <button class="text-2xl">←</button>
                <h3 class="text-lg font-medium">September 2024 - Week 1</h3>
                <button class="text-2xl">→</button>
            </div>

            <!-- Schedule Grid -->
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="border p-2">Time</th>
                            <th class="border p-2">Mon 30</th>
                            <th class="border p-2">Tue 31</th>
                            <th class="border p-2">Wed 1</th>
                            <th class="border p-2">Thu 2</th>
                            <th class="border p-2">Fri 3</th>
                            <th class="border p-2">Sat 4</th>
                            <th class="border p-2">Sun 5</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="border p-2 font-medium">6:30-7:00</td>
                            <td class="border p-2 bg-green-100 cursor-pointer hover:bg-green-200">John Doe</td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                        </tr>
                        <tr>
                            <td class="border p-2 font-medium">7:00-7:30</td>
                            <td class="border p-2"></td>
                            <td class="border p-2 bg-red-100 cursor-pointer hover:bg-red-200">Jane Smith (Absent)</td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                        </tr>
                        <!-- More time slots... -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Lesson Reports -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">Lesson Reports</h2>
            <p class="text-gray-600 mb-4">Click on a student name in the schedule to write a lesson report.</p>
            
            <!-- Report Form (hidden by default) -->
            <div class="hidden" id="reportForm">
                <h3 class="text-lg font-medium mb-2">Lesson Report for <span id="studentName"></span></h3>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Date:</label>
                    <input type="date" class="border rounded px-3 py-2 w-full" id="reportDate">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Status:</label>
                    <select class="border rounded px-3 py-2 w-full" id="lessonStatus">
                        <option value="completed">Completed</option>
                        <option value="absent">Absent</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Comments:</label>
                    <textarea class="border rounded px-3 py-2 w-full h-32" id="lessonComments" placeholder="Enter lesson notes..."></textarea>
                </div>
                <div class="flex space-x-2">
                    <button class="bg-amber-500 text-white px-4 py-2 rounded">Save Report</button>
                    <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Cancel</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Simple JavaScript for demonstration
        document.addEventListener('DOMContentLoaded', function() {
            const studentCells = document.querySelectorAll('td[class*="bg-green-100"], td[class*="bg-red-100"]');
            const reportForm = document.getElementById('reportForm');
            const studentNameSpan = document.getElementById('studentName');
            
            studentCells.forEach(cell => {
                cell.addEventListener('click', function() {
                    const studentName = this.textContent.split(' (')[0]; // Remove "(Absent)" if present
                    studentNameSpan.textContent = studentName;
                    reportForm.classList.remove('hidden');
                });
            });
        });
    </script>
</body>
</html>
