<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Language School</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50">
    <!-- Header -->
    <header class="bg-amber-500 text-white p-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">Language School Admin</h1>
            <div class="flex items-center space-x-4">
                <span>Welcome, Admin</span>
                <button class="bg-amber-600 hover:bg-amber-700 px-4 py-2 rounded">Menu</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-6">
        <!-- Teacher Tabs -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Teachers</h2>
            <div class="flex space-x-2 overflow-x-auto">
                <button class="bg-amber-500 text-white px-4 py-2 rounded whitespace-nowrap">Teacher 1</button>
                <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded whitespace-nowrap">Teacher 2</button>
                <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded whitespace-nowrap">Teacher 3</button>
                <button class="bg-purple-100 text-purple-700 px-4 py-2 rounded whitespace-nowrap">+ Add Teacher</button>
            </div>
        </div>

        <!-- Schedule Table -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Weekly Schedule</h2>
                <div class="flex space-x-2">
                    <button class="bg-amber-500 text-white px-4 py-2 rounded">Edit</button>
                    <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Read</button>
                </div>
            </div>
            
            <!-- Week Navigation -->
            <div class="flex justify-between items-center mb-4">
                <button class="text-2xl">←</button>
                <h3 class="text-lg font-medium">September 2024 - Week 1</h3>
                <button class="text-2xl">→</button>
            </div>

            <!-- Schedule Grid -->
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="border p-2">Time</th>
                            <th class="border p-2">Mon 30</th>
                            <th class="border p-2">Tue 31</th>
                            <th class="border p-2">Wed 1</th>
                            <th class="border p-2">Thu 2</th>
                            <th class="border p-2">Fri 3</th>
                            <th class="border p-2">Sat 4</th>
                            <th class="border p-2">Sun 5</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="border p-2 font-medium">6:30-7:00</td>
                            <td class="border p-2 bg-green-100">John Doe</td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                        </tr>
                        <tr>
                            <td class="border p-2 font-medium">7:00-7:30</td>
                            <td class="border p-2"></td>
                            <td class="border p-2 bg-red-100">Jane Smith (Absent)</td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                            <td class="border p-2"></td>
                        </tr>
                        <!-- More time slots... -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Student Management -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">Student Management</h2>
            <div class="flex space-x-4 mb-4">
                <button class="bg-amber-500 text-white px-4 py-2 rounded">See All Students</button>
                <button class="bg-purple-500 text-white px-4 py-2 rounded">Add Student</button>
            </div>
            
            <!-- Student List -->
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="border p-2">Name</th>
                            <th class="border p-2">Added Date</th>
                            <th class="border p-2">Lessons Taken</th>
                            <th class="border p-2">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="border p-2">John Doe</td>
                            <td class="border p-2">2024-01-15</td>
                            <td class="border p-2">12</td>
                            <td class="border p-2">
                                <button class="text-blue-600 hover:underline">Edit</button>
                                <button class="text-red-600 hover:underline ml-2">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
